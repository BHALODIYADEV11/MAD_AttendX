name: attendx
description: "AttendX - Smart Student Attendance Tracker"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.2.0
  firebase_messaging: ^15.0.3

  # State Management
  flutter_riverpod: ^2.5.1

  # Local Notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # UI & Utilities
  google_fonts: ^6.2.1
  fl_chart: ^0.69.0
  intl: ^0.20.2
  shared_preferences: ^2.3.2
  go_router: ^14.3.0
  device_preview: ^1.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
